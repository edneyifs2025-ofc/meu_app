name: meu_app
description: "App de Gestão Escolar com login GOV.BR"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🟢 Banco de dados local (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 🔥 Login externo (GOV.BR)
  url_launcher: ^6.2.5

  # 💾 Armazenamento simples
  shared_preferences: ^2.2.3

  # ✨ SVG
  flutter_svg: ^2.0.10

  # 🔗 DEEP LINK (CORRETO PARA SEU CÓDIGO)
  uni_links: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # 🎨 Ícone do app
  flutter_launcher_icons: ^0.13.1

# 🔥 Configuração dos ícones
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png