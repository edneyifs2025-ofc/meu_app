name: meu_app
description: "App de Gestão Escolar com login GOV.BR"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Login e navegação externa (GOV.BR)
  url_launcher: ^6.2.5

  # 💾 Salvar login do usuário
  shared_preferences: ^2.2.2

  # ✨ (OPCIONAL - mas recomendado)
  # Ícones mais bonitos e modernos
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 🎨 Gerar ícone do app
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png